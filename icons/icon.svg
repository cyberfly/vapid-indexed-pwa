<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- App icon: green background with a white checkmark -->
  <rect width="192" height="192" rx="24" fill="#4CAF50"/>
  <!-- Clipboard shape -->
  <rect x="44" y="56" width="104" height="108" rx="8" fill="white"/>
  <rect x="68" y="44" width="56" height="24" rx="8" fill="white"/>
  <rect x="76" y="40" width="40" height="16" rx="6" fill="#4CAF50"/>
  <!-- Checkmark lines representing todos -->
  <line x1="62" y1="88" x2="130" y2="88" stroke="#e0e0e0" stroke-width="6" stroke-linecap="round"/>
  <line x1="62" y1="108" x2="130" y2="108" stroke="#e0e0e0" stroke-width="6" stroke-linecap="round"/>
  <line x1="62" y1="128" x2="100" y2="128" stroke="#e0e0e0" stroke-width="6" stroke-linecap="round"/>
  <!-- Green checkmark on first line -->
  <polyline points="56,88 64,96 80,80" fill="none" stroke="#4CAF50" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
